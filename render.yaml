# Blueprint para Render: https://render.com/docs/blueprint-spec
# En el dashboard: New → Blueprint → conecta este repo y despliega.
# Luego copia la URL pública (https://xxx.onrender.com) y úsala en GitHub como VITE_API_ORIGIN.

services:
  - type: web
    name: stock-info-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Required for /api/fmp/fundamentals. Set in Render dashboard → Environment.
      # GitHub repo secrets do NOT apply here — only Render env vars do.
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_PROVIDER
        sync: false
