# Despliega el frontend (carpeta dist) a GitHub Pages.
# Requisitos en el repo: Settings → Pages → Source = GitHub Actions.
# El API Express no corre en Pages: despliega el servidor en otro servicio y
# define VITE_API_ORIGIN (secret o variable del repo) con la URL base (https, sin barra final), p. ej. https://tu-api.onrender.com

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Por defecto: /nombre-repo/. Para sitio en la raíz (repo usuario.github.io),
          # crea la variable del repositorio VITE_BASE_PATH con valor /
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          # Secret o variable; la URL debe ser https (Pages bloquea API http por mixed content).
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN || vars.VITE_API_ORIGIN }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
